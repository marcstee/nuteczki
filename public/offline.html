<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nuteczki – brak połączenia</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        background-color: #13243f;
        color: #e8f0fe;
        font-family: "Baloo 2", "Segoe UI", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        padding: 2rem;
        text-align: center;
      }

      img {
        width: 120px;
        height: auto;
        opacity: 0.85;
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        line-height: 1.2;
      }

      p {
        font-size: 1rem;
        opacity: 0.8;
        max-width: 24rem;
        line-height: 1.5;
      }

      button {
        margin-top: 0.5rem;
        padding: 0.65rem 1.75rem;
        border: 2px solid #e8f0fe;
        border-radius: 9999px;
        background: transparent;
        color: #e8f0fe;
        font-size: 1rem;
        cursor: pointer;
      }

      button:hover {
        background: rgba(232, 240, 254, 0.1);
      }
    </style>
  </head>
  <body>
    <img src="/mascot.webp" alt="Nuteczki maskotka" />
    <h1>Brak połączenia</h1>
    <p>Sprawdź połączenie z internetem i spróbuj ponownie.</p>
    <button onclick="window.location.reload()">Spróbuj ponownie</button>
  </body>
</html>
